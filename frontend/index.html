<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar-Fix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Grammar-Fix</h1>
        
        <!-- Auth Section (Login/Register) -->
        <div id="auth-section">
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div id="login-tab" class="tab-content active">
                <h2>Login</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="register-tab" class="tab-content">
                <h2>Register</h2>
                <form id="register-form">
                    <input type="email" id="register-email" placeholder="Email" required>
                    <input type="password" id="register-password" placeholder="Password" required>
                    <button type="submit">Register</button>
                </form>
            </div>

            <div id="auth-message" class="message"></div>
        </div>

        <!-- App Section (Text Correction) -->
        <div id="app-section" style="display: none;">
            <div class="user-info">
                <span>Logged in as: <strong id="user-email"></strong></span>
                <button onclick="logout()">Logout</button>
            </div>

            <h2>Text Correction</h2>
            <form id="correction-form">
                <textarea id="input-text" placeholder="Enter text to correct..." rows="6" required></textarea>
                <button type="submit">Correct Text</button>
            </form>

            <div id="correction-result" style="display: none;">
                <h3>Original Text:</h3>
                <div class="text-box" id="original-text"></div>
                
                <h3>Corrected Text:</h3>
                <div class="text-box corrected" id="corrected-text"></div>
            </div>

            <div id="app-message" class="message"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
